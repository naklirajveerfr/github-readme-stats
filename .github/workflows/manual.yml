name: Generate Stats
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour automatically
  workflow_dispatch: # This adds the "Run workflow" button in the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow the workflow to commit the file to your repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate stats SVG
        run: |
          # Replace 'YOUR_GITHUB_USERNAME' with your actual username
          curl -s "https://github-readme-stats.vercel.app/api?username=naklirajveerfr&show_icons=true" > stats.svg

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          # Only commit and push if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats.svg" && git push)
